<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>失语的黄昏 / Twilight of Aphasia</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #d4c5a9;
      --muted: #6b5f4e;
      --accent: #c9a84c;
      --card: #14141f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Georgia', 'Noto Serif SC', serif;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    header {
      margin-bottom: 32px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
    .start-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      min-height: 56px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .start-btn:hover, .start-btn:focus-visible {
      background: var(--accent);
      color: var(--bg);
      outline: none;
    }
    .status {
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 20px;
    }
    .verse {
      position: absolute;
      bottom: 32px;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main id="app">
    <header>
      <h1>失语的黄昏</h1>
      <p class="subtitle">Twilight of Aphasia</p>
    </header>
    <button class="start-btn" role="button" aria-label="开始游戏">开始</button>
    <p class="status" id="status"></p>
    <p class="verse">"来吧，我们要建造一座城和一座塔，塔顶通天。"</p>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
